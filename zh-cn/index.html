<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitHub 云端文件系统</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:"Microsoft YaHei",sans-serif; }
body { background:#f5f5f5; height:100vh; display:flex; flex-direction:column; }

.top-bar {
    height:45px; background:#fff; border-bottom:1px solid #ddd;
    display:flex; align-items:center; padding:0 12px; gap:10px;
}
.btn {
    padding:6px 12px; border:1px solid #ccc; background:#fff;
    border-radius:4px; cursor:pointer;
}
.btn:hover { background:#f0f0f0; }
.path-bar {
    flex:1; padding:6px 10px; border:1px solid #ccc; border-radius:4px;
}
.file-area {
    flex:1; padding:20px; display:grid;
    grid-template-columns:repeat(auto-fill,100px);
    gap:20px; align-content:start; overflow:auto;
}
.item {
    width:100px; text-align:center; cursor:pointer;
}
.item-icon { font-size:48px; margin-bottom:5px; }
.item-name { font-size:14px; word-break:break-all; }
.item.selected { background:#cce5ff; }

.context-menu {
    position:fixed; width:150px; background:#fff;
    border:1px solid #ccc; box-shadow:2px 2px 5px #aaa;
    display:none; z-index:999;
}
.context-menu div { padding:8px 12px; cursor:pointer; }
.context-menu div:hover { background:#e9e9e9; }

.modal {
    position:fixed; top:0; left:0; right:0; bottom:0;
    background:rgba(0,0,0,0.3); display:none;
    align-items:center; justify-content:center; z-index:1000;
}
.modal-box {
    background:#fff; padding:20px; border-radius:6px; width:300px;
}
.modal-box input, .modal-box textarea { width:100%; padding:8px; margin:10px 0; }
.modal-buttons { display:flex; justify-content:flex-end; gap:10px; }
.tip { color:#666; font-size:12px; margin-top:10px; }
</style>
</head>
<body>

<div class="top-bar">
    <button class="btn" id="backBtn">← 返回</button>
    <input type="text" class="path-bar" id="pathBar" readonly>
    <button class="btn" id="newFolderBtn">新建文件夹</button>
    <button class="btn" id="newFileBtn">新建文件</button>
</div>
<div class="tip" style="text-align:center;">操作会直接保存到 GitHub 仓库</div>
<div class="file-area" id="fileArea"></div>

<!-- 右键菜单 -->
<div class="context-menu" id="contextMenu">
    <div id="openFileMenu">打开编辑</div>
    <div id="renameMenu">重命名</div>
    <div id="deleteMenu">删除</div>
</div>

<!-- 重命名弹窗 -->
<div class="modal" id="renameModal">
    <div class="modal-box">
        <h3>重命名</h3>
        <input type="text" id="renameInput">
        <div class="modal-buttons">
            <button class="btn" id="renameCancel">取消</button>
            <button class="btn" id="renameConfirm">确定</button>
        </div>
    </div>
</div>

<!-- 文件编辑弹窗 -->
<div class="modal" id="editModal">
    <div class="modal-box" style="width:500px;">
        <h3>编辑文件</h3>
        <textarea id="editContent" rows="15"></textarea>
        <div class="modal-buttons">
            <button class="btn" id="editCancel">取消</button>
            <button class="btn" id="editSave">保存</button>
        </div>
    </div>
</div>

<script>
// ===================== 【这里改成你自己的】 =====================
const GITHUB_USER = "parkerzhang-5";
const GITHUB_REPO = "cdn";
const GITHUB_TOKEN = "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";
// ==============================================================

const API_BASE = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents`;
let pathStack = [];
let currentDir = null;
let selectedItem = null;
let currentEditFileName = "";

const fileArea = document.getElementById("fileArea");
const pathBar = document.getElementById("pathBar");
const backBtn = document.getElementById("backBtn");
const newFolderBtn = document.getElementById("newFolderBtn");
const newFileBtn = document.getElementById("newFileBtn");
const contextMenu = document.getElementById("contextMenu");
const renameModal = document.getElementById("renameModal");
const renameInput = document.getElementById("renameInput");
const editModal = document.getElementById("editModal");
const editContent = document.getElementById("editContent");

// 初始化：加载 fs.json
(async function init() {
    await loadFS();
})();

// 读取仓库文件（base64解码）
async function getFile(path) {
    const res = await fetch(`${API_BASE}/${path}`, {
        headers: { Authorization: `token ${GITHUB_TOKEN}` }
    });
    if (!res.ok) return null;
    const data = await res.json();
    return {
        content: atob(data.content),
        sha: data.sha
    };
}

// 写入/更新仓库文件
async function saveFile(path, content, sha = null) {
    await fetch(`${API_BASE}/${path}`, {
        method: "PUT",
        headers: {
            Authorization: `token ${GITHUB_TOKEN}`,
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            message: "auto save",
            content: btoa(content),
            sha: sha
        })
    });
}

// 删除仓库文件
async function deleteFile(path, sha) {
    await fetch(`${API_BASE}/${path}`, {
        method: "DELETE",
        headers: {
            Authorization: `token ${GITHUB_TOKEN}`,
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ message: "delete", sha: sha })
    });
}

// 加载文件系统结构 fs.json
async function loadFS() {
    let fsData = await getFile("fs.json");
    if (!fsData) {
        // 首次初始化
        const initFS = {
            name: "根目录",
            type: "folder",
            children: []
        };
        await saveFile("fs.json", JSON.stringify(initFS, null, 2));
        pathStack = [initFS];
        currentDir = initFS;
    } else {
        const root = JSON.parse(fsData.content);
        pathStack = [root];
        currentDir = root;
    }
    render();
}

// 保存整个文件系统到 fs.json
async function saveFS() {
    const root = pathStack[0];
    const fsData = await getFile("fs.json");
    await saveFile("fs.json", JSON.stringify(root, null, 2), fsData?.sha);
}

// 渲染当前目录
function render() {
    fileArea.innerHTML = "";
    pathBar.value = pathStack.map(d => d.name).join(" / ");

    if (!currentDir.children) return;

    currentDir.children.forEach(item => {
        const div = document.createElement("div");
        div.className = "item";
        div.dataset.type = item.type;
        div.dataset.name = item.name;

        const icon = item.type === "folder" ? "📁" : "📄";
        div.innerHTML = `
            <div class="item-icon">${icon}</div>
            <div class="item-name">${item.name}</div>
        `;

        div.addEventListener("click", (e) => {
            e.stopPropagation();
            clearSelect();
            div.classList.add("selected");
            selectedItem = item;
        });

        div.addEventListener("dblclick", async () => {
            if (item.type === "folder") {
                pathStack.push(item);
                currentDir = item;
                render();
            } else {
                // 双击打开文件编辑
                await openEditFile(item.name);
            }
        });

        div.addEventListener("contextmenu", (e) => {
            e.preventDefault();
            clearSelect();
            div.classList.add("selected");
            selectedItem = item;
            showContextMenu(e.clientX, e.clientY);
        });

        fileArea.appendChild(div);
    });
}

function getCurrentPathStr() {
    // 从根往下拼当前路径
    return pathStack.map(d => d.name).join("/");
}

backBtn.addEventListener("click", () => {
    if (pathStack.length > 1) {
        pathStack.pop();
        currentDir = pathStack[pathStack.length - 1];
        render();
    }
});

document.addEventListener("click", () => {
    clearSelect();
    hideContextMenu();
});

function clearSelect() {
    document.querySelectorAll(".item.selected").forEach(el => el.classList.remove("selected"));
    selectedItem = null;
}

function showContextMenu(x, y) {
    contextMenu.style.left = x + "px";
    contextMenu.style.top = y + "px";
    contextMenu.style.display = "block";
}
function hideContextMenu() {
    contextMenu.style.display = "none";
}

// ========== 右键菜单功能 ==========
document.getElementById("openFileMenu").addEventListener("click", async () => {
    if (!selectedItem || selectedItem.type !== "file") return;
    await openEditFile(selectedItem.name);
    hideContextMenu();
});

document.getElementById("renameMenu").addEventListener("click", () => {
    if (!selectedItem) return;
    renameInput.value = selectedItem.name;
    renameModal.style.display = "flex";
    hideContextMenu();
});

document.getElementById("deleteMenu").addEventListener("click", async () => {
    if (!selectedItem) return;
    const name = selectedItem.name;
    const type = selectedItem.type;

    // 1. 删除 fs.json 里的项
    const idx = currentDir.children.indexOf(selectedItem);
    if (idx > -1) currentDir.children.splice(idx, 1);
    await saveFS();

    // 2. 如果是文件，删除仓库里的真实文件
    if (type === "file") {
        const filePath = `files/${name}`;
        const file = await getFile(filePath);
        if (file) await deleteFile(filePath, file.sha);
    }

    render();
    hideContextMenu();
});

// ========== 重命名弹窗 ==========
document.getElementById("renameCancel").addEventListener("click", () => {
    renameModal.style.display = "none";
});
document.getElementById("renameConfirm").addEventListener("click", async () => {
    if (!selectedItem) return;
    const oldName = selectedItem.name;
    const newName = renameInput.value.trim();
    if (!newName) return;

    // 1. 修改名称
    selectedItem.name = newName;
    await saveFS();

    // 2. 如果是文件，重命名仓库文件（删除旧，新建新）
    if (selectedItem.type === "file") {
        const oldPath = `files/${oldName}`;
        const newPath = `files/${newName}`;
        const oldFile = await getFile(oldPath);
        if (oldFile) {
            await saveFile(newPath, oldFile.content);
            await deleteFile(oldPath, oldFile.sha);
        }
    }

    renameModal.style.display = "none";
    render();
});

// ========== 新建文件夹/文件 ==========
newFolderBtn.addEventListener("click", async () => {
    const name = prompt("文件夹名：", "新建文件夹");
    if (!name) return;
    currentDir.children.push({
        name,
        type: "folder",
        children: []
    });
    await saveFS();
    render();
});

newFileBtn.addEventListener("click", async () => {
    const name = prompt("文件名：", "新建文件.txt");
    if (!name) return;
    // 1. 写入空文件到仓库 files/
    await saveFile(`files/${name}`, "");
    // 2. 更新 fs.json
    currentDir.children.push({
        name,
        type: "file"
    });
    await saveFS();
    render();
});

// ========== 文件编辑 ==========
async function openEditFile(name) {
    currentEditFileName = name;
    const file = await getFile(`files/${name}`);
    editContent.value = file ? file.content : "";
    editModal.style.display = "flex";
}

document.getElementById("editCancel").addEventListener("click", () => {
    editModal.style.display = "none";
});
document.getElementById("editSave").addEventListener("click", async () => {
    await saveFile(`files/${currentEditFileName}`, editContent.value);
    editModal.style.display = "none";
    alert("已保存到 GitHub！");
});
</script>

</body>
</html>
